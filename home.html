<!DOCTYPE html>
<html lang="en-ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1.0, width=device-width">
        <title>Aaryn Xie</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Glass+Antiqua|Zeyada">
    </head>

    <body>
        <div class="website" id="home">
            <!--this is my header-->
            <div class="header">
                <img id="header-background" src="photos/headerbg.png"
                    alt="the header background: a white bar with colourful splashes of blue and purple">
                <a class="home-button" href="home.html"><img src="photos/headerhome.png"
                        alt="the home button: 3 sparkles" /></a>
                <div class="nav">
                    <ul>
                        <li><span class="aboutme"><a href="aboutme.html">About Me</a></span> </li>
                        <li><span class="portfolio"><a href="portfolio.html">Portfolio</a></span></li>
                    </ul>
                </div>
            </div>
            <div class="content">
                <!--this is the top section of my homescreen, displaying an image of a drawing of me and my name-->
                <div id="home-top">
                    <img id="home-background1" src="photos/home/homebg1.png"
                        alt="the top home background: a black background with swirls of purple">
                </div>
                <!--this is the bottom section of my homescreen, displaying a preview of my portfolio as well as a paragraph directing the view to my portfolio-->
                <div id="home-bottom">
                    <img id="home-background2" src="photos/home/homebg2.png"
                        alt="the bottom home background: a white background with colourful splashes of blue and purple">
                    <div id="home-bottom-content">
                        <!--the portfolio preview-->
                        <div id="home-bottom-left">
                            <img id="homeportfolio" src="photos/home/homeportfolio.png"
                                alt="a preview of my work included in my portfolio">
                        </div>
                        <!--the paragraph about my portfolio-->
                        <div id="home-bottom-right">
                            <h1 class="title" id="home-bottom-title">My Work</h1>
                            <p>I am an illustrator and graphic designer from Canada. I like to work with bright and vibrant
                                colours to tell a variety of different stories.</p>
                            <span class="portfolio"><a href="portfolio.html">Portfolio</a></span>
                        </div>
                    </div>
                </div>
            </div>
            <!--this is my footer-->
            <div class="footer">
                <p>©2023 Aaryn Xie</p>
                <div class="footer-images">
                    <a href="mailto:a34xie@uwaterloo.ca"><img src="photos/email logo.png" alt="email logo"></a>
                    <a target="_blank" href="https://www.instagram.com/rynn.illust/"><img src="photos/instagram logo.png"
                            alt="instagram logo"></a>
                </div>
            </div>
        </div>
    </body>
</html>
