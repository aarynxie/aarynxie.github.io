<!DOCTYPE html>
<html lang="en-ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1.0, width=device-width">
        <title>Portfolio - Aaryn Xie</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Glass+Antiqua|Zeyada">
    </head>

    <body>
        <div class="website" id="portfolio">
            <!--this is my header-->
            <div class="header">
                <img id="header-background" src="photos/headerbg.png"
                    alt="the header background: a white bar with colourful splashes of blue and purple">
                <a class="home-button" href="/"><img src="photos/headerhome.png"
                        alt="the home button: 3 sparkles" /></a>
                <div class="nav">
                    <ul>
                        <li><span class="aboutme"><a href="/aboutme">About Me</a></span> </li>
                        <!--the id invokes the css that indicates we're on the portfolio page-->
                        <li><span class="portfolio" id="portfolio-link"><a href="/portfolio">Portfolio</a></span></li>
                    </ul>
                </div>
            </div>
            <div class="content">
                <!--this is the introduction to my portfolio, which includes a title and a short description of this page-->
                <div id="portfolio-intro">
                    <div id="portfolio-intro-left">
                        <h1 class="title">My Work</h1>
                    </div>
                    <div id="portfolio-intro-right">
                        <p>A selection of the work I’ve done for class and personal projects. I work with a wide range of
                            themes, often portraying them with vibrant colours.</p>
                    </div>
                </div>
                <!--a 3-panel painting collection, with the common theme of world origins-->
                <div class="world-origins">
                    <img class="bigger" src="photos/portfolio/drawing1.PNG"
                        alt="a painting of the world origin, according to Chinese mythology">
                    <img class="bigger" src="photos/portfolio/drawing 5.PNG"
                        alt="a painting of the world origin, according to Finnish mythology">
                    <div id="world-origins-right">
                        <h1>World Origins</h1>
                        <p>As portrayed in Chinese, Finnish and Egyptian mythology.</p>
                        <img class="bigger" src="photos/portfolio/drawing2.PNG"
                            alt="a painting of the world origin, according to Egyptian mythology">
                    </div>
                </div>
                <!--my other drawings that are not in a series-->
                <div class="miscellaneous">
                    <h1 class="title"> Miscellaneous</h1>
                    <div id="row1">
                        <img class="bigger" id="miscellaneous1" src="photos/portfolio/drawing 3.png"
                            alt="a painting of a bird in front of a Chinese-style door">
                        <img class="bigger" id="miscellaneous2" src="photos/portfolio/drawing 6.png"
                            alt="a painting of a girl staring at the viewer, a virtual projection of herself above her head">
                        <img class="bigger" id="miscellaneous3" src="photos/portfolio/drawing 4.png"
                            alt="a painting of a holiday concert, a girl cheering in the foreground">
                    </div>
                    <div id="row2">
                        <img class="bigger" id="miscellaneous4" src="photos/portfolio/drawing 11.png"
                            alt="a drawing of a girl in a cyan, magenta, yellow colour palette">
                        <img class="bigger" id="miscellaneous5" src="photos/portfolio/drawing 10.png"
                            alt="a drawing of a koi pond from a bird's-eye-view">
                        <img class="bigger" id="miscellaneous6" src="photos/portfolio/drawing 9.GIF"
                            alt="a short animation of a spirit cat hopping across a magical hollow filled with snow">
                    </div>
                </div>
            </div>
            <!--this is my footer-->
            <div class="footer">
                <p>©2023 Aaryn Xie</p>
                <div class="footer-images">
                    <a href="mailto:a34xie@uwaterloo.ca"><img src="photos/email logo.png" alt="email logo"></a>
                    <a target="_blank" href="https://www.instagram.com/rynn.illust/"><img src="photos/instagram logo.png"
                            alt="instagram logo"></a>
                </div>
            </div>
        </div>
    </body>
</html>
